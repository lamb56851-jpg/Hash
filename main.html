<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Chats</title>
    <style>
        :root {
            --bg: #000000;
            --glass-lite: rgba(255, 255, 255, 0.05);
            --accent: #00B689;
            --sub: #8E8E93;
            --border-color: rgba(255, 255, 255, 0.1);
            
            /* Новые ПЛАВНЫЕ градиенты */
            --g-orange: linear-gradient(135deg, rgba(255, 149, 0, 0.9) 0%, rgba(178, 80, 0, 0.6) 100%);
            --g-green: linear-gradient(135deg, rgba(52, 199, 89, 0.9) 0%, rgba(26, 99, 45, 0.6) 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: white; overflow-x: hidden; position: relative; }

        /* --- HEADER --- */
        .main-header {
            padding-top: env(safe-area-inset-top);
            background: var(--bg);
            position: sticky; top: 0; z-index: 200; /* Выше блюра */
        }

        .s-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 10px; }
        
        /* Заголовок с шевроном */
        .title-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .s-title { font-size: 26px; font-weight: 800; letter-spacing: -0.7px; }
        .chevron-icon { 
            width: 14px; height: 14px; background: var(--sub); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/32/32195.png') center/contain no-repeat;
            margin-top: 6px;
            transition: transform 0.3s ease;
        }
        
        /* Группа иконок справа */
        .header-actions { display: flex; gap: 16px; align-items: center; }
        .edit-icon { 
            width: 22px; height: 22px; background: var(--accent); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') center/contain no-repeat; 
            cursor: pointer;
        }

        /* --- FILTER BAR --- */
        .filter-container { padding: 5px 24px 20px; }
        .filter-bar { 
            background: var(--glass-lite); border-radius: 999px; 
            padding: 3px; display: flex; position: relative; border: 0.5px solid var(--border-color);
        }
        .f-btn { flex: 1; border: none; background: none; color: var(--sub); font-size: 13px; font-weight: 700; padding: 8px 0; cursor: pointer; z-index: 2; display: flex; align-items: center; justify-content: center; }
        .f-btn.active { color: white; }
        .f-slider { position: absolute; background: rgba(255, 255, 255, 0.12); border-radius: 999px; height: calc(100% - 6px); top: 3px; transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1; }

        /* --- CHATS LIST (То, что размывается) --- */
        .main-content { padding-top: 8px; transition: filter 0.3s ease, opacity 0.3s ease; }
        .chat-item { overflow: hidden; }
        .chat-row { display: flex; padding: 12px 24px; gap: 16px; align-items: center; cursor: pointer; }
        
        .ava-circle { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; overflow: hidden; }
        .ava-circle::after { content: ''; position: absolute; inset: 0; background: inherit; filter: blur(10px); opacity: 0.3; }
        .ava-icon { width: 24px; height: 24px; background: white; -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; z-index: 2; position: relative; }
        .bg-orange { background: var(--g-orange); }
        .bg-green { background: var(--g-green); }

        .chat-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
        .chat-name-row { display: flex; align-items: center; }
        .chat-name { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
        .v-badge { width: 16px; height: 16px; background: var(--accent); -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') center/contain no-repeat; margin-left: 4px; }
        .chat-msg { font-size: 14px; color: var(--sub); }
        .divider { height: 0.5px; background: var(--border-color); margin-left: 94px; }

        /* ============================== */
        /* = Context Menu iOS = */
        /* ============================== */
        
        /* Фон блюра */
        #menuBackdrop {
            position: fixed; inset: 0; top: env(safe-area-inset-top);
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
            z-index: 150; visibility: hidden; opacity: 0;
            transition: visibility 0.3s, opacity 0.3s, backdrop-filter 0.3s ease;
        }
        
        /* Стеклянное Окно Меню */
        .ios-context-menu {
            position: fixed;
            top: calc(75px + env(safe-area-inset-top)); /* Прямо под "Чаты" */
            left: 24px; width: 190px;
            background: rgba(25, 25, 27, 0.7);
            backdrop-filter: blur(35px) saturate(210%); -webkit-backdrop-filter: blur(35px) saturate(210%);
            border-radius: 14px;
            border: 0.5px solid rgba(255,255,255,0.06);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 210; /* Выше всего */
            
            /* Анимация увеличения из ничего */
            transform-origin: top left;
            transform: scale(0.8) translateY(-10px);
            opacity: 0; visibility: hidden;
            transition: transform 0.25s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.25s, visibility 0.25s;
        }
        
        /* Пункты меню */
        .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer; transition: background 0.1s;
        }
        .menu-item:active { background: rgba(255,255,255,0.08); }
        
        .m-icon {
            width: 19px; height: 19px;
            background: white; opacity: 0.85;
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }
        .m-text { font-size: 15px; font-weight: 500; color: white; letter-spacing: -0.2px; }
        
        .menu-divider { height: 0.5px; background: rgba(255,255,255,0.06); margin-left: 48px; }

        /* ============================== */
        /* = Состояния Меню = */
        /* ============================== */
        body.menu-open .chevron-icon { transform: rotate(180deg); }
        body.menu-open .main-content { filter: blur(20px); opacity: 0.5; pointer-events: none; }
        body.menu-open #menuBackdrop { visibility: visible; opacity: 1; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        body.menu-open .ios-context-menu { visibility: visible; opacity: 1; transform: scale(1) translateY(0); }

    </style>
</head>
<body id="mainBody">

    <div id="menuBackdrop" onclick="closeMenu()"></div>

    <div class="ios-context-menu" id="iosMenu">
        <div class="menu-item">
            <div class="m-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/3019/3019014.png');"></div>
            <span class="m-text">Настройки</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item">
            <div class="m-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/7263/7263334.png');"></div>
            <span class="m-text">Выйти</span>
        </div>
    </div>

    <header class="main-header">
        <div class="s-header">
            <div class="title-wrap" onclick="toggleMenu()">
                <span class="s-title">Чаты</span>
                <div class="chevron-icon"></div>
            </div>
            <div class="edit-icon"></div>
        </div>
        
        <div class="filter-container">
            <div class="filter-bar">
                <div class="f-slider" id="fSlider"></div>
                <button class="f-btn active" onclick="filter('all', this)">Все</button>
                <button class="f-btn" onclick="filter('bots', this)">Боты</button>
                <button class="f-btn" onclick="filter('create', this)">Создать</button>
            </div>
        </div>
    </header>

    <div class="main-content" id="mainContent">
        <div class="chats-list">
            <div class="chat-item">
                <div class="chat-row">
                    <div class="ava-circle bg-orange">
                        <div class="ava-icon" style="width: 24px; height: 24px; -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/10812/10812271.png');"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name-row"><span class="chat-name">Ключи</span><div class="v-badge"></div></div>
                        <span class="chat-msg">Чат пуст</span>
                    </div>
                </div>
                <div class="divider"></div>
            </div>

            <div class="chat-item">
                <div class="chat-row">
                    <div class="ava-circle bg-green">
                        <div class="ava-icon" style="width: 28px; height: 28px; -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/11831/11831523.png');"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name-row"><span class="chat-name">Поддержка</span></div>
                        <span class="chat-msg">Чат пуст</span>
                    </div>
                </div>
                <div class="divider"></div>
            </div>
        </div>
    </div>

    <script>
        const body = document.getElementById('mainBody');
        const fSlider = document.getElementById('fSlider');

        // Меню
        function toggleMenu() { body.classList.toggle('menu-open'); }
        function closeMenu() { body.classList.remove('menu-open'); }

        // Фильтры
        function filter(type, btn) {
            if(body.classList.contains('menu-open')) return; // Не кликать при открытом меню
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fSlider.style.left = btn.offsetLeft + 'px';
            fSlider.style.width = btn.offsetWidth + 'px';
        }

        window.onload = () => {
            const af = document.querySelector('.f-btn.active');
            if(af) {
                fSlider.style.left = af.offsetLeft + 'px';
                fSlider.style.width = af.offsetWidth + 'px';
            }
        };
    </script>
</body>
</html>
