<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(25, 25, 27, 0.82);
            --accent: #00B689;
            --border: rgba(255, 255, 255, 0.18);
            --sub: #8E8E93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Manrope", sans-serif;
            color: white; margin: 0; height: 100vh; width: 100vw;
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* --- Стеклянная голова --- */
        .top-nav {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1.2px solid var(--border);
            border-radius: 0 0 32px 32px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: 20px;
            z-index: 100;
            position: relative;
        }

        .welcome-title {
            padding: 20px 24px 15px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* --- Горизонтальный Закреп --- */
        .pinned-container {
            overflow-x: auto;
            display: flex;
            gap: 20px;
            padding: 0 24px;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .pinned-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .pinned-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .pinned-ava {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: #1c1c1e;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .pinned-ava img { width: 100%; height: 100%; object-fit: cover; }
        .pinned-name { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7); }

        /* --- Основной контент (скролл) --- */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        /* Заголовок Чаты + Edit */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 24px 15px;
        }
        .section-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        .edit-icon {
            width: 22px;
            height: 22px;
            background: var(--accent);
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') no-repeat center / contain;
            mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') no-repeat center / contain;
            cursor: pointer;
        }

        /* --- Ячейки чатов --- */
        .chat-row {
            display: flex;
            padding: 12px 24px;
            gap: 16px;
            align-items: stretch; /* Важно для выравнивания текста по краям аватарки */
        }

        .chat-ava {
            width: 54px;
            height: 54px;
            border-radius: 15px;
            background: #1c1c1e;
            overflow: hidden;
            flex-shrink: 0;
        }
        .chat-ava img { width: 100%; height: 100%; object-fit: cover; }

        .chat-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Имя сверху, бейдж снизу */
            padding: 2px 0;
        }

        .chat-name-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-name { font-size: 17px; font-weight: 500; color: white; }
        
        .verify-badge {
            width: 18px;
            height: 18px;
            background: var(--accent);
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') no-repeat center / contain;
            mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') no-repeat center / contain;
        }

        .role-tag {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 5px;
            background: rgba(0, 182, 137, 0.2);
            color: var(--accent);
            text-transform: uppercase;
            width: fit-content;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.2); /* Ярче */
            margin-left: 94px; /* 24 padding + 54 ava + 16 gap */
        }

        /* --- Tab Bar --- */
        .nav-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            padding: 4px;
        }
        .nav-btn {
            flex: 1;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            z-index: 2;
        }
        .nav-icon {
            width: 22px; height: 22px; background: var(--sub);
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat;
        }
        .nav-btn.active .nav-icon { background: var(--accent); }
        .nav-btn.active .nav-text { color: var(--accent); }
        .nav-text { font-size: 10px; font-weight: 600; color: var(--sub); }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="welcome-title">Добро пожаловать в Hash</div>
        <div class="pinned-container">
            <div class="pinned-item">
                <div class="pinned-ava"><img src="Content/Logos/KeysAv.PNG"></div>
                <span class="pinned-name">Ключи</span>
            </div>
            </div>
    </div>

    <div class="main-scroll">
        <div class="section-header">
            <span class="section-title">Чаты</span>
            <div class="edit-icon"></div>
        </div>

        <div class="chat-row">
            <div class="chat-ava"><img src="Content/Logos/KeysAv.PNG"></div>
            <div class="chat-details">
                <div class="chat-name-wrap">
                    <span class="chat-name">Ключи</span>
                    <div class="verify-badge"></div>
                </div>
                <div class="role-tag">Бот</div>
            </div>
        </div>
        <div class="divider"></div>

        <div class="chat-row">
            <div class="chat-ava"><img src="Content/Logos/TechAv.PNG"></div>
            <div class="chat-details">
                <div class="chat-name">ТехПоддержка</div>
                <div class="role-tag">Поддержка</div>
            </div>
        </div>
        <div class="divider"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active">
            <div class="nav-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/6997/6997164.png');"></div>
            <span class="nav-text">Главная</span>
        </div>
        <div class="nav-btn">
            <div class="nav-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/9959/9959489.png');"></div>
            <span class="nav-text">Настройки</span>
        </div>
    </div>

</body>
</html>
