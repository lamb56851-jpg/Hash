<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Chats</title>
    <style>
        :root {
            --bg: #000000;
            --glass-lite: rgba(255, 255, 255, 0.05);
            --accent: #00B689;
            --sub: #8E8E93;
            --border-color: rgba(255, 255, 255, 0.1);
            
            /* Цветовая палитра для аватарок */
            --g-blue: linear-gradient(135deg, #007AFF 0%, #004094 100%);
            --g-orange: linear-gradient(135deg, #FF9500 0%, #B25000 100%);
            --g-green: linear-gradient(135deg, #34C759 0%, #1A632D 100%);
            --g-purple: linear-gradient(135deg, #AF52DE 0%, #5B2A74 100%);
            --g-white: linear-gradient(135deg, #FFFFFF 0%, #8E8E93 100%);
            --g-pink: linear-gradient(135deg, #FF2D55 0%, #921A31 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: white; overflow-x: hidden; }

        /* --- HEADER --- */
        .main-header {
            padding-top: env(safe-area-inset-top);
            background: var(--bg);
            position: sticky; top: 0; z-index: 100;
        }

        .s-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 10px; }
        .title-wrap { display: flex; align-items: center; gap: 8px; }
        .s-title { font-size: 26px; font-weight: 800; letter-spacing: -0.7px; }
        .chevron-icon { 
            width: 14px; height: 14px; background: var(--sub); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/7065/7065868.png') center/contain no-repeat;
            margin-top: 4px;
        }
        
        .edit-icon { 
            width: 22px; height: 22px; background: var(--accent); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') center/contain no-repeat; 
            cursor: pointer;
        }

        /* --- FILTER BAR --- */
        .filter-container { padding: 5px 24px 20px; }
        .filter-bar { 
            background: var(--glass-lite); border-radius: 999px; 
            padding: 3px; display: flex; position: relative; border: 0.5px solid var(--border-color);
        }
        .f-btn { flex: 1; border: none; background: none; color: var(--sub); font-size: 13px; font-weight: 700; padding: 8px 0; cursor: pointer; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .f-btn.active { color: white; }
        .f-slider { position: absolute; background: rgba(255, 255, 255, 0.12); border-radius: 999px; height: calc(100% - 6px); top: 3px; transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1; }

        /* --- CHATS LIST --- */
        .chat-item { overflow: hidden; transition: 0.3s ease; opacity: 1; max-height: 120px; }
        .chat-item.hidden { max-height: 0; opacity: 0; pointer-events: none; }

        .chat-row { display: flex; padding: 14px 24px; gap: 16px; align-items: center; cursor: pointer; }
        .chat-row:active { background: rgba(255,255,255,0.05); }
        
        /* Градиентные аватарки */
        .ava-circle {
            width: 54px; height: 54px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .ava-icon {
            width: 24px; height: 24px; background: white;
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }

        /* Применение цветов */
        .bg-orange { background: var(--g-orange); }
        .bg-green { background: var(--g-green); }

        .chat-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .chat-name-row { display: flex; align-items: center; justify-content: space-between; }
        .chat-name { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
        .v-badge { width: 16px; height: 16px; background: var(--accent); -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') center/contain no-repeat; margin-left: 4px; display: inline-block; vertical-align: middle; }
        
        .chat-msg { font-size: 14px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
        
        .divider { height: 0.5px; background: var(--border-color); margin-left: 94px; margin-right: 0; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="s-header">
            <div class="title-wrap">
                <span class="s-title">Чаты</span>
                <div class="chevron-icon"></div>
            </div>
            <div class="edit-icon"></div>
        </div>
        
        <div class="filter-container">
            <div class="filter-bar">
                <div class="f-slider" id="fSlider"></div>
                <button class="f-btn active" onclick="filter('all', this)">Все</button>
                <button class="f-btn" onclick="filter('bots', this)">Боты</button>
                <button class="f-btn" onclick="filter('create', this)">Создать</button>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div class="chats-list" id="chatsList">
            
            <div class="chat-item" data-type="bots">
                <div class="chat-row">
                    <div class="ava-circle bg-orange">
                        <div class="ava-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/10812/10812271.png');"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <span class="chat-name">Ключи<div class="v-badge"></div></span>
                        </div>
                        <span class="chat-msg">Ваш лицензионный ключ активирован</span>
                    </div>
                </div>
                <div class="divider"></div>
            </div>

            <div class="chat-item" data-type="support">
                <div class="chat-row">
                    <div class="ava-circle bg-green">
                        <div class="ava-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/11831/11831523.png');"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <span class="chat-name">Поддержка</span>
                        </div>
                        <span class="chat-msg">Здравствуйте! Чем я могу вам помочь?</span>
                    </div>
                </div>
                <div class="divider"></div>
            </div>

        </div>
    </div>

    <script>
        const fSlider = document.getElementById('fSlider');
        function filter(type, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fSlider.style.left = btn.offsetLeft + 'px';
            fSlider.style.width = btn.offsetWidth + 'px';

            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                if (type === 'all' || item.dataset.type === type) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        window.onload = () => {
            const af = document.querySelector('.f-btn.active');
            if(af) {
                fSlider.style.left = af.offsetLeft + 'px';
                fSlider.style.width = af.offsetWidth + 'px';
            }
        };
    </script>
</body>
</html>
