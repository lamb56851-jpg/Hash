<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Home</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(25, 25, 27, 0.82);
            --accent: #00B689;
            --border: rgba(255, 255, 255, 0.18);
            --sub: #8E8E93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: white; overflow: hidden; }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .top-nav {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1.2px solid var(--border); border-radius: 0 0 32px 32px;
            padding-top: env(safe-area-inset-top); padding-bottom: 18px; z-index: 100; position: relative;
        }
        .welcome-title { padding: 16px 24px 12px; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        
        .pinned-wrap { display: flex; gap: 18px; padding: 0 24px; overflow-x: auto; scrollbar-width: none; }
        .pinned-wrap::-webkit-scrollbar { display: none; }
        .p-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        .p-ava { width: 60px; height: 60px; border-radius: 18px; background: #1c1c1e; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .p-ava img { width: 100%; height: 100%; object-fit: cover; }
        .p-name { font-size: 11px; font-weight: 600; color: var(--sub); }

        /* --- КОНТЕНТ --- */
        .main-content { height: 100vh; overflow-y: auto; padding-bottom: 150px; }
        .s-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 10px; }
        .s-title { font-size: 19px; font-weight: 700; }
        .edit-icon { 
            width: 20px; height: 20px; background: var(--accent); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') center/contain no-repeat;
        }

        /* --- ЧАТЫ --- */
        .chat-row { display: flex; padding: 12px 24px; gap: 14px; align-items: stretch; position: relative; }
        .chat-ava { width: 52px; height: 52px; border-radius: 14px; background: #1c1c1e; overflow: hidden; flex-shrink: 0; }
        .chat-ava img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 2px 0; }
        .chat-n-wrap { display: flex; align-items: center; gap: 6px; }
        .chat-name { font-size: 16px; font-weight: 500; }
        .v-badge { width: 17px; height: 17px; background: var(--accent); -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') center/contain no-repeat; }
        
        .badge { font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 5px; background: rgba(0, 182, 137, 0.2); color: var(--accent); text-transform: uppercase; width: fit-content; }
        .divider { height: 1px; background: rgba(255, 255, 255, 0.2); margin: 0 24px; }

        /* --- МЕНЮ (TAB BAR) --- */
        .tab-bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 240px; background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(20px);
            border-radius: 28px; padding: 4px; display: flex; border: 0.5px solid rgba(255,255,255,0.1); z-index: 200;
        }
        .tab-btn { flex: 1; padding: 8px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; z-index: 5; border: none; background: none; outline: none; }
        .t-icon { width: 20px; height: 20px; background: var(--sub); -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; }
        .t-text { font-size: 10px; font-weight: 600; color: var(--sub); }
        .tab-btn.active .t-icon { background: var(--accent); }
        .tab-btn.active .t-text { color: var(--accent); }
        
        .slider { position: absolute; background: rgba(255,255,255,0.1); border-radius: 24px; height: calc(100% - 8px); top: 4px; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); z-index: 1; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="welcome-title">Добро пожаловать в Hash</div>
        <div class="pinned-wrap">
            <div class="p-item">
                <div class="p-ava"><img src="Content/Logos/KeysAv.PNG"></div>
                <span class="p-name">Ключи</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="s-header">
            <span class="s-title">Чаты</span>
            <div class="edit-icon"></div>
        </div>

        <div class="chat-row">
            <div class="chat-ava"><img src="Content/Logos/KeysAv.PNG"></div>
            <div class="chat-info">
                <div class="chat-n-wrap"><span class="chat-name">Ключи</span><div class="v-badge"></div></div>
                <div class="badge">Бот</div>
            </div>
        </div>
        <div class="divider"></div>

        <div class="chat-row">
            <div class="chat-ava"><img src="Content/Logos/TechAv.PNG"></div>
            <div class="chat-info">
                <span class="chat-name">ТехПоддержка</span>
                <div class="badge">Поддержка</div>
            </div>
        </div>
        </div>

    <div class="tab-bar">
        <div class="slider" id="slider"></div>
        <button class="tab-btn active" onclick="moveSlider(this)">
            <div class="t-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/6997/6997164.png');"></div>
            <span class="t-text">Главная</span>
        </button>
        <button class="tab-btn" onclick="moveSlider(this)">
            <div class="t-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/9959/9959489.png');"></div>
            <span class="t-text">Настройки</span>
        </button>
    </div>

    <script>
        const slider = document.getElementById('slider');
        function moveSlider(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            slider.style.left = btn.offsetLeft + 'px';
            slider.style.width = btn.offsetWidth + 'px';
        }
        window.onload = () => moveSlider(document.querySelector('.tab-btn.active'));
    </script>
</body>
</html>
