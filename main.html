<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Главная</title>
    <style>
        :root {
            --ios-bg: #000000;
            --accent: #00B689;
            --sub-text: #8E8E93;
            --glass-border: rgba(255, 255, 255, 0.22);
        }

        body, html {
            background: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: white; margin: 0; height: 100vh; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .main-scroll {
            height: 100vh;
            overflow-y: auto;
            padding-top: env(safe-area-inset-top);
            padding-bottom: 150px;
        }

        /* --- ЗАГОЛОВКИ --- */
        .section-header {
            padding: 24px 24px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-main { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .title-secondary { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }

        .edit-icon {
            width: 20px; height: 20px; background: white;
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') no-repeat center / contain;
            mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') no-repeat center / contain;
            cursor: pointer; opacity: 0.8;
        }

        /* --- ЗАКРЕП (ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ) --- */
        .pinned-scroll-wrapper {
            padding: 0 24px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            -ms-overflow-style: none;  /* IE/Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .pinned-scroll-wrapper::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .pinned-item { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
        .pinned-ava { 
            width: 64px; height: 64px; border-radius: 20px; 
            background: #1c1c1e; border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
        }
        .pinned-ava img { width: 100%; height: 100%; object-fit: cover; }
        .pinned-name { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.7); }

        /* --- СПИСОК ЧАТОВ --- */
        .chat-cell {
            display: flex;
            padding: 14px 24px;
            gap: 16px;
            align-items: stretch; /* Важно для выравнивания текста по краям авы */
        }

        .cell-ava {
            width: 54px; height: 54px; border-radius: 15px;
            overflow: hidden; flex-shrink: 0; background: #1c1c1e;
        }
        .cell-ava img { width: 100%; height: 100%; object-fit: cover; }

        .cell-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Имя сверху, бейдж снизу */
            padding: 2px 0;
        }

        .name-row { display: flex; align-items: center; gap: 6px; }
        .name-txt { font-size: 17px; font-weight: 500; letter-spacing: -0.3px; }
        
        .badge {
            font-size: 9px; font-weight: 800;
            padding: 3px 7px; border-radius: 5px;
            background: rgba(0, 182, 137, 0.25);
            color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.5px;
            width: fit-content;
        }

        .separator {
            height: 0.5px;
            background: var(--glass-border);
            margin-left: 94px; /* Отступ под аватаром */
        }

        .v-icon {
            width: 18px; height: 18px; background: var(--accent);
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') no-repeat center / contain;
        }

        /* --- МЕНЮ (ПУЛЬТ) --- */
        .tab-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 240px; background: rgba(25, 25, 27, 0.8);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid rgba(255,255,255,0.1); border-radius: 32px;
            display: flex; padding: 4px; z-index: 1000;
        }
        .tab-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 8px 0; border: none; background: none; position: relative; z-index: 2;
        }
        .tab-icon {
            width: 22px; height: 22px; background: var(--sub-text);
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat;
        }
        .tab-btn.active .tab-icon { background: var(--accent); }
        .slider {
            position: absolute; top: 4px; left: 4px; height: calc(100% - 8px);
            width: 116px; background: rgba(255,255,255,0.1); border-radius: 28px;
            transition: transform 0.3s cubic-bezier(0.2, 1, 0.3, 1); z-index: 1;
        }
    </style>
</head>
<body>

    <div class="main-scroll">
        <div class="section-header">
            <h1 class="title-main">Добро пожаловать в Hash</h1>
        </div>

        <div class="pinned-scroll-wrapper">
            <div class="pinned-item">
                <div class="pinned-ava"><img src="Content/Logos/KeysAv.PNG"></div>
                <span class="pinned-name">Ключи</span>
            </div>
            <div class="pinned-item">
                <div class="pinned-ava"><img src="Content/Logos/TechAv.PNG"></div>
                <span class="pinned-name">Поддержка</span>
            </div>
            </div>

        <div class="section-header" style="margin-top: 20px;">
            <h2 class="title-secondary">Чаты</h2>
            <div class="edit-icon"></div>
        </div>

        <div class="chats-list">
            <div class="chat-cell">
                <div class="cell-ava"><img src="Content/Logos/KeysAv.PNG"></div>
                <div class="cell-info">
                    <div class="name-row">
                        <span class="name-txt">Ключи</span>
                        <div class="v-icon"></div>
                    </div>
                    <div class="badge">Бот</div>
                </div>
            </div>
            <div class="separator"></div>

            <div class="chat-cell">
                <div class="cell-ava"><img src="Content/Logos/TechAv.PNG"></div>
                <div class="cell-info">
                    <div class="name-line"><span class="name-txt">ТехПоддержка</span></div>
                    <div class="badge">Поддержка</div>
                </div>
            </div>
            <div class="separator"></div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="slider" id="slider"></div>
        <button class="tab-btn active" onclick="moveSlider(0)">
            <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/6997/6997164.png');"></div>
        </button>
        <button class="tab-btn" onclick="moveSlider(1)">
            <div class="tab-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/9959/9959489.png');"></div>
        </button>
    </div>

    <script>
        function moveSlider(index) {
            const slider = document.getElementById('slider');
            slider.style.transform = `translateX(${index * 116}px)`;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
        }
    </script>

</body>
</html>
