<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Home</title>
    <style>
        :root {
            --bg: #000000;
            --glass-lite: rgba(255, 255, 255, 0.05);
            --accent: #00B689;
            --sub: #8E8E93;
            --border-color: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); font-family: -apple-system, system-ui, sans-serif; color: white; overflow-x: hidden; }

        /* --- HEADER --- */
        .main-header {
            padding-top: env(safe-area-inset-top);
            background: var(--bg);
            position: sticky; top: 0; z-index: 100;
        }

        .s-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 10px; }
        
        /* Заголовок с шевроном */
        .title-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; transition: opacity 0.2s; }
        .title-wrap:active { opacity: 0.7; }
        .s-title { font-size: 26px; font-weight: 800; letter-spacing: -0.7px; }
        .chevron-icon { 
            width: 14px; height: 14px; background: var(--sub); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/7065/7065868.png') center/contain no-repeat;
            margin-top: 4px; /* Выравнивание по базовой линии */
        }
        
        /* Группа иконок справа */
        .header-actions { display: flex; gap: 16px; align-items: center; }
        .h-icon { width: 22px; height: 22px; cursor: pointer; transition: transform 0.2s; }
        .h-icon:active { transform: scale(0.9); }
        
        .edit-icon { background: var(--accent); -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') center/contain no-repeat; }
        .settings-icon { background: var(--accent); -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/3019/3019014.png') center/contain no-repeat; }

        /* --- FILTER BAR --- */
        .filter-container { padding: 5px 24px 15px; }
        .filter-bar { 
            background: var(--glass-lite); border-radius: 999px; 
            padding: 3px; display: flex; position: relative; border: 0.5px solid var(--border-color);
            backdrop-filter: blur(20px);
        }
        .f-btn { flex: 1; border: none; background: none; color: var(--sub); font-size: 13px; font-weight: 700; padding: 8px 0; cursor: pointer; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .f-btn.active { color: white; }
        .plus-icon { width: 13px; height: 13px; background: currentColor; -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/1828/1828925.png') center/contain no-repeat; }
        .f-slider { position: absolute; background: rgba(255, 255, 255, 0.12); border-radius: 999px; height: calc(100% - 6px); top: 3px; transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1; }

        /* --- COMPACT PINNED --- */
        .pinned-section {
            padding: 0 24px 20px;
            display: flex; gap: 16px;
            overflow-x: auto; scrollbar-width: none;
        }
        .pinned-section::-webkit-scrollbar { display: none; }

        .p-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        
        .glass-ava {
            width: 54px; height: 54px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative; overflow: hidden;
        }
        
        .ava-keys {
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent),
                        linear-gradient(135deg, rgba(0, 182, 137, 0.15) 0%, rgba(0, 150, 255, 0.1) 100%);
        }
        .ava-support { 
            background: radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent),
                        linear-gradient(135deg, rgba(94, 92, 230, 0.2) 0%, rgba(0, 150, 255, 0.15) 100%);
        }

        .glass-ava-icon {
            width: 22px; height: 22px; background: white; opacity: 0.85;
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }

        .p-name { font-size: 10px; font-weight: 600; color: var(--sub); }

        /* --- CHATS LIST --- */
        .main-content { padding-bottom: 40px; }
        .chat-item { overflow: hidden; transition: 0.3s ease; opacity: 1; max-height: 100px; }
        .chat-item.hidden { max-height: 0; opacity: 0; pointer-events: none; }

        .chat-row { display: flex; padding: 12px 24px; gap: 16px; align-items: center; cursor: pointer; }
        .chat-row:active { background: rgba(255,255,255,0.03); }
        
        .chat-info { flex: 1; display: flex; flex-direction: column; }
        .chat-name { font-size: 17px; font-weight: 500; letter-spacing: -0.2px; }
        .v-badge { width: 18px; height: 18px; background: var(--accent); -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') center/contain no-repeat; margin-left: 6px; display: inline-block; vertical-align: middle; }
        
        .divider { height: 0.5px; background: rgba(255, 255, 255, 0.08); margin-left: 94px; margin-right: 24px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="s-header">
            <div class="title-wrap">
                <span class="s-title">Чаты</span>
                <div class="chevron-icon"></div>
            </div>
            <div class="header-actions">
                <div class="h-icon edit-icon"></div>
                <div class="h-icon settings-icon"></div>
            </div>
        </div>
        
        <div class="filter-container">
            <div class="filter-bar">
                <div class="f-slider" id="fSlider"></div>
                <button class="f-btn active" onclick="filter('all', this)">Все</button>
                <button class="f-btn" onclick="filter('bots', this)">Боты</button>
                <button class="f-btn" onclick="filter('create', this)"><div class="plus-icon"></div>Создать</button>
            </div>
        </div>

        <div class="pinned-section">
            <div class="p-item">
                <div class="glass-ava ava-keys">
                    <div class="glass-ava-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/63/63432.png');"></div>
                </div>
                <span class="p-name">Ключи</span>
            </div>
            <div class="p-item">
                <div class="glass-ava ava-support">
                    <div class="glass-ava-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/6528/6528598.png');"></div>
                </div>
                <span class="p-name">Поддержка</span>
            </div>
        </div>
    </header>

    <div class="main-content">
        <div class="chats-list" id="chatsList">
            <div class="chat-item" data-type="bots">
                <div class="chat-row">
                    <div class="glass-ava ava-keys" style="width: 52px; height: 52px;">
                        <div class="glass-ava-icon" style="width: 22px; height: 22px; -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/63/63432.png');"></div>
                    </div>
                    <div class="chat-info">
                        <span class="chat-name">Ключи<div class="v-badge"></div></span>
                    </div>
                </div>
                <div class="divider"></div>
            </div>

            <div class="chat-item" data-type="support">
                <div class="chat-row">
                    <div class="glass-ava ava-support" style="width: 52px; height: 52px;">
                        <div class="glass-ava-icon" style="width: 22px; height: 22px; -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/6528/6528598.png');"></div>
                    </div>
                    <div class="chat-info">
                        <span class="chat-name">Поддержка</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fSlider = document.getElementById('fSlider');
        function filter(type, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fSlider.style.left = btn.offsetLeft + 'px';
            fSlider.style.width = btn.offsetWidth + 'px';

            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                if (type === 'all' || item.dataset.type === type) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        window.onload = () => {
            const af = document.querySelector('.f-btn.active');
            if(af) {
                fSlider.style.left = af.offsetLeft + 'px';
                fSlider.style.width = af.offsetWidth + 'px';
            }
        };
    </script>
</body>
</html>
