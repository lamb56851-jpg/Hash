<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Chats</title>
    <style>
        :root {
            /* iOS System Colors */
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.85); 
            --ios-label: #FFFFFF;
            --ios-secondary-label: #8E8E93;
            --ios-separator: rgba(255, 255, 255, 0.12);
            --ios-red: #FF453A;
            
            --accent: #00B689;
            
            /* Gradients for avatars */
            --g-orange: linear-gradient(135deg, rgba(255, 149, 0, 0.9) 0%, rgba(178, 80, 0, 0.6) 100%);
            --g-green: linear-gradient(135deg, rgba(52, 199, 89, 0.9) 0%, rgba(26, 99, 45, 0.6) 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--ios-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: var(--ios-label); 
            overflow-x: hidden; 
            position: relative; 
        }

        /* --- HEADER --- */
        .main-header {
            padding-top: env(safe-area-inset-top);
            background: var(--ios-bg);
            position: sticky; top: 0; z-index: 200;
        }

        .s-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 10px; }
        
        /* Заголовок (Не блюрится) */
        .title-wrap { 
            display: flex; align-items: center; gap: 8px; cursor: pointer; 
            position: relative; z-index: 250; 
            user-select: none;
        }
        .s-title { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
        
        .chevron-icon { 
            width: 14px; height: 14px; background: var(--ios-secondary-label); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/32/32195.png') center/contain no-repeat;
            margin-top: 8px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .header-actions { transition: filter 0.3s ease, opacity 0.3s; }
        .edit-icon { 
            width: 22px; height: 22px; background: var(--accent); 
            -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png') center/contain no-repeat; 
            cursor: pointer;
        }

        /* --- NAVIGATION --- */
        .nav-section { 
            position: relative; background: var(--ios-bg); 
            transition: filter 0.3s ease, opacity 0.3s; 
        }
        .filter-container { padding: 5px 24px 12px; }
        .filter-bar { 
            background: rgba(120, 120, 128, 0.24);
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 10px; padding: 2px; display: flex; position: relative; 
            border: 0.5px solid var(--ios-separator);
        }
        .f-btn { 
            flex: 1; border: none; background: none; color: rgba(255,255,255,0.5); 
            font-size: 13px; font-weight: 600; padding: 7px 0; cursor: pointer; z-index: 2; 
        }
        .f-btn.active { color: var(--ios-label); }
        .f-slider { 
            position: absolute; background: rgba(255, 255, 255, 0.2); 
            border-radius: 8px; height: calc(100% - 4px); top: 2px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; 
        }

        .header-shadow {
            position: absolute; bottom: -40px; left: 0; width: 100%; height: 40px;
            background: linear-gradient(to bottom, var(--ios-bg) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            pointer-events: none; z-index: 50;
        }

        /* --- CHATS --- */
        .main-content { padding-top: 8px; transition: filter 0.3s ease, opacity 0.3s; }
        .chat-row { display: flex; padding: 12px 24px; gap: 16px; align-items: center; cursor: pointer; }
        
        .ava-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ava-icon { background: white; -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; }
        
        .bg-orange { background: var(--g-orange); }
        .bg-green { background: var(--g-green); }

        .chat-info { flex: 1; display: flex; flex-direction: column; }
        .chat-name { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; color: var(--ios-label); }
        .chat-msg { font-size: 15px; color: var(--ios-secondary-label); margin-top: 1px; letter-spacing: -0.01em; }
        .divider { height: 0.5px; background: var(--ios-separator); margin-left: 94px; }

        /* --- IOS CONTEXT MENU --- */
        #menuBackdrop {
            position: fixed; inset: 0; z-index: 150; visibility: hidden; opacity: 0;
            background: rgba(0,0,0,0.3); transition: 0.3s ease;
        }
        
        .ios-context-menu {
            position: fixed;
            top: calc(75px + env(safe-area-inset-top));
            left: 24px; width: 220px;
            background: var(--ios-glass);
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 14px;
            z-index: 260;
            
            /* Градиентный контур */
            border: 1px solid transparent;
            background-clip: padding-box;
            border-image: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%) 1;
            
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform-origin: top left;
            transform: scale(0.8) translateY(-10px);
            opacity: 0; visibility: hidden;
            transition: transform 0.25s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.25s;
        }
        
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; }
        .menu-item:active { background: rgba(255,255,255,0.1); }
        .m-text { font-size: 17px; font-weight: 400; color: var(--ios-label); }
        .m-icon { width: 20px; height: 20px; background: var(--ios-label); -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; }
        .menu-divider { height: 0.5px; background: var(--ios-separator); margin: 0 16px; }

        /* Состояния открытия */
        body.menu-open .chevron-icon { transform: rotate(180deg); }
        body.menu-open .main-content, 
        body.menu-open .nav-section, 
        body.menu-open .header-actions { filter: blur(10px) saturate(140%); opacity: 0.4; pointer-events: none; }
        body.menu-open #menuBackdrop { visibility: visible; opacity: 1; }
        body.menu-open .ios-context-menu { visibility: visible; opacity: 1; transform: scale(1) translateY(0); }

    </style>
</head>
<body id="mainBody">

    <div id="menuBackdrop" onclick="closeMenu()"></div>

    <div class="ios-context-menu" id="iosMenu">
        <div class="menu-item" onclick="closeMenu()">
            <span class="m-text">Настройки</span>
            <div class="m-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/3019/3019014.png'); opacity: 0.7;"></div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" onclick="closeMenu()">
            <span class="m-text" style="color: var(--ios-red);">Выйти</span>
            <div class="m-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/7263/7263334.png'); background: var(--ios-red);"></div>
        </div>
    </div>

    <header class="main-header">
        <div class="s-header">
            <div class="title-wrap" id="titleTrigger">
                <span class="s-title">Чаты</span>
                <div class="chevron-icon"></div>
            </div>
            <div class="header-actions">
                <div class="edit-icon"></div>
            </div>
        </div>
        
        <div class="nav-section">
            <div class="filter-container">
                <div class="filter-bar" id="filterBar">
                    <div class="f-slider" id="fSlider"></div>
                    <button class="f-btn active" onclick="filter('all', this)">Все</button>
                    <button class="f-btn" onclick="filter('bots', this)">Боты</button>
                    <button class="f-btn" onclick="filter('create', this)">Создать</button>
                </div>
            </div>
            <div class="header-shadow"></div>
        </div>
    </header>

    <div class="main-content">
        <div class="chat-item">
            <div class="chat-row">
                <div class="ava-circle bg-orange">
                    <div class="ava-icon" style="width: 24px; height: 24px; -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/10812/10812271.png');"></div>
                </div>
                <div class="chat-info">
                    <div class="chat-name">Ключи <div class="v-badge" style="width: 15px; height: 15px; background: var(--accent); -webkit-mask: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png') center/contain no-repeat; display: inline-block; vertical-align: middle;"></div></div>
                    <span class="chat-msg">Чат пуст</span>
                </div>
            </div>
            <div class="divider"></div>
        </div>

        <div class="chat-item">
            <div class="chat-row">
                <div class="ava-circle bg-green">
                    <div class="ava-icon" style="width: 28px; height: 28px; -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/11831/11831523.png');"></div>
                </div>
                <div class="chat-info">
                    <div class="chat-name">Поддержка</div>
                    <span class="chat-msg">Чат пуст</span>
                </div>
            </div>
            <div class="divider"></div>
        </div>
    </div>

    <script>
        const body = document.getElementById('mainBody');
        const fSlider = document.getElementById('fSlider');
        const titleTrigger = document.getElementById('titleTrigger');

        // Вибрация и открытие меню
        titleTrigger.addEventListener('click', () => {
            // Haptic Feedback
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10); // Легкий импульс
            }
            toggleMenu();
        });

        function toggleMenu() { body.classList.toggle('menu-open'); }
        function closeMenu() { body.classList.remove('menu-open'); }

        function filter(type, btn) {
            if(body.classList.contains('menu-open')) return;
            
            // Вибрация при смене таба
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }

            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            updateSlider(btn);
        }

        function updateSlider(btn) {
            fSlider.style.width = (btn.offsetWidth - 4) + 'px';
            fSlider.style.left = (btn.offsetLeft + 2) + 'px';
        }

        window.onload = () => {
            const af = document.querySelector('.f-btn.active');
            if(af) updateSlider(af);
        };
    </script>
</body>
</html>
