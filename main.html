<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Chats</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.9);
            --ios-label: #FFFFFF;
            --ios-sub: rgba(255, 255, 255, 0.45);
            --ios-sep: rgba(255, 255, 255, 0.1);
            --ios-red: #FF453A;
            --accent: #00B689;
            
            /* Глубокие градиенты */
            --g-emerald: linear-gradient(135deg, #008f6b 0%, #004d3a 100%);
            --g-amber: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            
            --spring-easing: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--ios-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: var(--ios-label); 
            overflow: hidden; 
            height: 100vh;
        }

        .flex-center { display: flex; align-items: center; justify-content: center; }
        .mask-icon { background: currentColor; -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center; }

        /* --- UI COMPONENTS --- */
        .main-header { padding-top: env(safe-area-inset-top); position: sticky; top: 0; z-index: 200; background: var(--ios-bg); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 10px; }
        
        .title-group { display: flex; align-items: center; gap: 8px; cursor: pointer; z-index: 250; }
        .title-group h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
        .chevron { width: 14px; height: 14px; background: var(--ios-sub); -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/32/32195.png'); margin-top: 8px; transition: transform 0.4s var(--spring-easing); }

        .edit-btn { width: 22px; height: 22px; color: var(--accent); -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/9883/9883181.png'); cursor: pointer; transition: 0.3s; }

        .filter-section { padding: 5px 24px 12px; position: relative; }
        .filter-bar { 
            background: rgba(120, 120, 128, 0.24); border-radius: 999px; padding: 2px; display: flex; 
            position: relative; border: 0.5px solid var(--ios-sep); backdrop-filter: blur(20px);
        }
        .filter-btn { flex: 1; border: none; background: none; color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 700; padding: 7px 0; z-index: 2; transition: color 0.2s; }
        .filter-btn.active { color: #fff; }
        .filter-slider { position: absolute; background: rgba(255, 255, 255, 0.2); border-radius: 999px; height: calc(100% - 4px); top: 2px; transition: 0.4s var(--spring-easing); z-index: 1; }

        .shadow-overlay { position: absolute; bottom: -30px; left: 0; width: 100%; height: 30px; background: linear-gradient(to bottom, var(--ios-bg), transparent); pointer-events: none; }

        /* --- MENU SYSTEM --- */
        .backdrop { position: fixed; inset: 0; z-index: 150; visibility: hidden; opacity: 0; background: rgba(0,0,0,0.4); transition: 0.3s; }

        .context-menu {
            position: fixed; top: calc(72px + env(safe-area-inset-top)); left: 24px; width: 200px;
            background: var(--ios-glass); border-radius: 14px; z-index: 260;
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            
            transform-origin: top left; transform: scale(0.4) translateY(-20px); opacity: 0; visibility: hidden;
            transition: transform 0.5s var(--spring-easing), opacity 0.2s;
        }

        .context-menu::before {
            content: ""; position: absolute; inset: -1px; border-radius: 14px; padding: 1px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.35), rgba(255,255,255,0.02));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }

        .menu-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; color: #fff; }
        .menu-row:active { background: rgba(255,255,255,0.1); }
        .menu-row span { font-size: 17px; font-weight: 500; }
        .menu-row .icon { width: 20px; height: 20px; }
        .menu-sep { height: 0.5px; background: var(--ios-sep); margin: 0 16px; }

        /* --- CHAT LIST --- */
        .scroller { padding-top: 8px; overflow-y: auto; height: calc(100vh - 140px); transition: 0.4s; }
        .chat-card { display: flex; padding: 12px 24px; gap: 16px; align-items: center; cursor: pointer; }
        .avatar { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; }
        .avatar .icon { width: 24px; height: 24px; color: #fff; }
        
        .chat-body { flex: 1; border-bottom: 0.5px solid var(--ios-sep); padding-bottom: 12px; }
        .chat-card:last-child .chat-body { border: none; }
        .chat-info { display: flex; flex-direction: column; }
        .chat-info h3 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .chat-info p { font-size: 15px; color: var(--ios-sub); margin-top: 2px; }
        
        .badge-verif { width: 15px; height: 15px; color: var(--accent); -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/9918/9918743.png'); }

        /* --- STATES --- */
        body.menu-active .chevron { transform: rotate(180deg); }
        body.menu-active .scroller, body.menu-active .filter-section, body.menu-active .edit-btn { filter: blur(15px) saturate(150%); opacity: 0.4; pointer-events: none; }
        body.menu-active .backdrop { visibility: visible; opacity: 1; }
        body.menu-active .context-menu { visibility: visible; opacity: 1; transform: scale(1) translateY(0); }

    </style>
</head>
<body id="app">

    <div class="backdrop" onclick="App.toggleMenu()"></div>

    <div class="context-menu" id="menu">
        <div class="menu-row" onclick="App.toggleMenu()">
            <span>Чаты</span>
            <div class="icon mask-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/6998/6998782.png');"></div>
        </div>
        <div class="menu-sep"></div>
        <div class="menu-row" onclick="App.toggleMenu()">
            <span>Настройки</span>
            <div class="icon mask-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/7698/7698891.png');"></div>
        </div>
        <div class="menu-sep"></div>
        <div class="menu-row" style="color: var(--ios-red);" onclick="App.toggleMenu()">
            <span>Выйти</span>
            <div class="icon mask-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/7263/7263334.png');"></div>
        </div>
    </div>

    <header class="main-header">
        <div class="header-top">
            <div class="title-group" onclick="App.toggleMenu()">
                <h1>Чаты</h1>
                <div class="chevron mask-icon"></div>
            </div>
            <div class="edit-btn mask-icon"></div>
        </div>
        <div class="filter-section">
            <div class="filter-bar">
                <div class="filter-slider" id="fSlider"></div>
                <button class="filter-btn active" onclick="App.filter(this)">Все</button>
                <button class="filter-btn" onclick="App.filter(this)">Боты</button>
                <button class="filter-btn" onclick="App.filter(this)">Создать</button>
            </div>
            <div class="shadow-overlay"></div>
        </div>
    </header>

    <main class="scroller">
        <div class="chat-card">
            <div class="avatar flex-center" style="background: var(--g-amber);">
                <div class="icon mask-icon" style="-webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/10812/10812271.png');"></div>
            </div>
            <div class="chat-body">
                <div class="chat-info">
                    <h3>Ключи <div class="badge-verif mask-icon"></div></h3>
                    <p>Чат пуст</p>
                </div>
            </div>
        </div>
        <div class="chat-card">
            <div class="avatar flex-center" style="background: var(--g-emerald);">
                <div class="icon mask-icon" style="width: 28px; height: 28px; -webkit-mask-image: url('https://cdn-icons-png.flaticon.com/512/11831/11831523.png');"></div>
            </div>
            <div class="chat-body">
                <div class="chat-info">
                    <h3>Поддержка</h3>
                    <p>Чат пуст</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const App = {
            dom: {
                body: document.getElementById('app'),
                slider: document.getElementById('fSlider')
            },

            toggleMenu() {
                this.dom.body.classList.toggle('menu-active');
            },

            filter(btn) {
                if(this.dom.body.classList.contains('menu-active')) return;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.updateSlider(btn);
            },

            updateSlider(btn) {
                this.dom.slider.style.width = btn.offsetWidth + 'px';
                this.dom.slider.style.left = btn.offsetLeft + 'px';
            },

            init() {
                const activeBtn = document.querySelector('.filter-btn.active');
                if(activeBtn) this.updateSlider(activeBtn);
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
