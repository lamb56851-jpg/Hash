<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-secondary-bg: #1C1C1E; 
            --ios-tertiary-bg: #2C2C2E;
            --accent: #00B689;
            /* Цвет активной плашки в переключателе (чуть темнее) */
            --segment-active: #48484A; 
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Manrope", sans-serif;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Фон */
        .header-visual {
            position: absolute;
            top: 0;
            width: 100%;
            height: 40vh;
            z-index: 1;
        }
        .header-visual img { width: 100%; height: 100%; object-fit: cover; }
        .header-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 20%, var(--ios-bg) 100%);
        }

        /* Верхний блок */
        .top-container {
            position: absolute;
            top: 8vh;
            width: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .branding { display: flex; align-items: center; gap: 10px; }
        .logo-img {
            width: 48px; /* Мельче */
            height: 48px;
            border-radius: 11px;
            object-fit: cover;
        }
        .logo-text { font-size: 34px; font-weight: 800; letter-spacing: -0.05em; }

        /* Переключатель */
        .segmented-container {
            width: 230px;
            background: rgba(120, 120, 128, 0.2);
            border-radius: 10px;
            padding: 2px;
            display: flex;
            position: relative;
        }
        .segment-item {
            flex: 1;
            padding: 7px 0;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            z-index: 2;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            transition: color 0.2s;
        }
        .segment-item.active { color: white; }
        .liquid-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            height: calc(100% - 4px);
            background: var(--segment-active);
            border-radius: 8px;
            z-index: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Слайдер контента */
        .modal-glass {
            position: relative;
            height: 65vh;
            margin-top: 35vh;
            background: var(--ios-secondary-bg);
            border-radius: 30px 30px 0 0;
            z-index: 5;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .content-wrapper {
            display: flex;
            width: 200%; /* Две секции рядом */
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-section {
            width: 50%;
            padding: 30px 24px;
            box-sizing: border-box;
        }

        /* Инпуты */
        .input-group { margin-bottom: 14px; }
        .input-pill {
            background: var(--ios-tertiary-bg);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
        }
        .icon-small { width: 18px; height: 18px; margin-right: 12px; filter: invert(1); opacity: 0.5; }
        input { background: transparent; outline: none; width: 100%; font-size: 16px; color: white; }
        .hint { font-size: 12px; color: #8E8E93; padding: 4px 4px 0; }

        /* Кнопка в стиле iOS */
        .btn-action {
            background: var(--accent);
            border-radius: 14px; /* Не круглая, а squircle */
            padding: 14px; /* Меньше ростом */
            font-size: 16px;
            font-weight: 700;
            color: #000;
            width: 100%;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }
        .btn-action:active { background: #009d76; }
    </style>
</head>
<body>

    <div class="header-visual">
        <img src="Content/GIFs/Background.gif" alt="bg">
    </div>

    <div class="top-container">
        <div class="branding">
            <img src="Content/Logos/HashLogo.JPG" class="logo-img" alt="Hash">
            <span class="logo-text">Hash</span>
        </div>

        <div class="segmented-container">
            <div class="liquid-slider" id="slider"></div>
            <div class="segment-item active" onclick="slideTo(0, this)">Документация</div>
            <div class="segment-item" onclick="slideTo(1, this)">Логин</div>
        </div>
    </div>

    <div class="modal-glass">
        <div class="content-wrapper" id="contentWrapper">
            
            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-2xl font-bold mb-4">Безопасность Hash</h2>
                    <ul class="space-y-4">
                        <li class="bg-white/5 p-4 rounded-2xl">
                            <div class="text-[#00B689] font-bold text-xs uppercase mb-1">Zero Knowledge</div>
                            <div class="text-sm text-white/60">Мы не храним ваши ключи шифрования. Доступ есть только у вас.</div>
                        </li>
                        <li class="bg-white/5 p-4 rounded-2xl">
                            <div class="text-[#00B689] font-bold text-xs uppercase mb-1">No Metadata</div>
                            <div class="text-sm text-white/60">Ваши цифровые следы стираются сразу после завершения сессии.</div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-2xl font-bold mb-4">Вход</h2>
                    
                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/6997/6997204.png" class="icon-small">
                            <input type="text" placeholder="Имя" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <span class="text-white/30 mr-2 font-medium">@</span>
                            <input type="text" placeholder="username" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/15773/15773700.png" class="icon-small">
                            <input type="password" placeholder="Пароль">
                        </div>
                    </div>

                    <button class="btn-action">Продолжить</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('contentWrapper');
        const items = document.querySelectorAll('.segment-item');

        function slideTo(index, el) {
            // Переключатель
            items.forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            
            slider.style.left = el.offsetLeft + 'px';
            slider.style.width = el.offsetWidth + 'px';

            // Листание контента (0% или -50%)
            wrapper.style.transform = `translateX(-${index * 50}%)`;
        }

        // Установка начальной позиции слайдера
        window.onload = () => {
            const initial = items[0];
            slider.style.left = initial.offsetLeft + 'px';
            slider.style.width = initial.offsetWidth + 'px';
        };
    </script>
</body>
</html>
