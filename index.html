<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Secure Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.85); 
            --ios-tertiary: rgba(255, 255, 255, 0.08);
            --accent: #00B689;
            --segment-active: rgba(255, 255, 255, 0.15); 
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Manrope", sans-serif;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Фоновая гифка */
        .header-visual {
            position: absolute;
            top: 0;
            width: 100%;
            height: 45vh;
            z-index: 1;
        }
        .header-visual img { width: 100%; height: 100%; object-fit: cover; }
        .header-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 30%, var(--ios-bg) 100%);
        }

        /* Верхний контент */
        .top-container {
            position: absolute;
            top: 7vh;
            width: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .branding { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; }
        .logo-text { font-size: 32px; font-weight: 800; letter-spacing: -0.05em; }

        /* Стеклянный переключатель */
        .segmented-container {
            width: 240px;
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 3px;
            display: flex;
            position: relative;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .segment-item {
            flex: 1;
            padding: 5px 0;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            z-index: 2;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            transition: color 0.2s;
        }
        .segment-item.active { color: white; }
        
        .liquid-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            height: calc(100% - 6px);
            background: var(--segment-active);
            backdrop-filter: blur(10px);
            border-radius: 9px;
            z-index: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        /* Стеклянная модалка */
        .modal-glass {
            position: relative;
            height: 62vh;
            margin-top: 38vh;
            background: var(--ios-glass);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border-radius: 24px 24px 0 0;
            z-index: 5;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .content-wrapper {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-section {
            width: 50%;
            padding: 24px 28px;
            box-sizing: border-box;
        }

        /* Компактные инпуты */
        .input-group { margin-bottom: 10px; }
        .input-pill {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        .icon-small { 
            width: 18px; 
            height: 18px; 
            margin-right: 12px; 
            filter: brightness(0) invert(1); 
            opacity: 0.5; 
        }
        .at-icon {
            font-size: 18px;
            font-weight: 500;
            color: white;
            opacity: 0.5;
            margin-right: 12px;
            width: 18px;
            text-align: center;
        }
        input { background: transparent; outline: none; width: 100%; font-size: 16px; color: white; }
        input::placeholder { color: rgba(255,255,255,0.3); }

        .hint { font-size: 11px; color: rgba(255,255,255,0.3); padding: 4px 6px 0; }

        /* Кнопка iOS Style */
        .btn-action {
            background: var(--accent);
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            width: 100%;
            margin-top: 15px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-action:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header-visual">
        <img src="Content/GIFs/Background.gif" alt="bg">
    </div>

    <div class="top-container">
        <div class="branding">
            <img src="Content/Logos/HashLogo.JPG" class="logo-img" alt="Hash">
            <span class="logo-text">Hash</span>
        </div>

        <div class="segmented-container">
            <div class="liquid-slider" id="slider"></div>
            <div class="segment-item active" onclick="slideTo(0, this)">Документация</div>
            <div class="segment-item" onclick="slideTo(1, this)">Логин</div>
        </div>
    </div>

    <div class="modal-glass">
        <div class="content-wrapper" id="contentWrapper">
            
            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-xl font-bold mb-4">О приложении</h2>
                    <div class="space-y-3">
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                            <h3 class="text-[#00B689] font-bold text-[11px] uppercase tracking-wider mb-1">Privately</h3>
                            <p class="text-sm text-white/70">Ваши данные не покидают пределы компании.</p>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                            <h3 class="text-[#00B689] font-bold text-[11px] uppercase tracking-wider mb-1">Securely</h3>
                            <p class="text-sm text-white/70">Сквозное шифрование каждого сообщения.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-xl font-bold mb-4">Вход в Hash</h2>
                    
                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/6997/6997204.png" class="icon-small">
                            <input type="text" placeholder="Имя" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <span class="at-icon">@</span>
                            <input type="text" placeholder="username" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/15773/15773700.png" class="icon-small">
                            <input type="password" placeholder="Пароль">
                        </div>
                    </div>

                    <button class="btn-action">Продолжить</button>
                    <p class="text-center text-[11px] text-white/20 mt-4 uppercase tracking-tighter">Hash Enterprise v1.0</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('contentWrapper');
        const items = document.querySelectorAll('.segment-item');

        function slideTo(index, el) {
            items.forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            
            slider.style.left = el.offsetLeft + 'px';
            slider.style.width = el.offsetWidth + 'px';
            wrapper.style.transform = `translateX(-${index * 50}%)`;
        }

        window.onload = () => {
            const initial = items[0];
            slider.style.left = initial.offsetLeft + 'px';
            slider.style.width = initial.offsetWidth + 'px';
        };
    </script>
</body>
</html>
