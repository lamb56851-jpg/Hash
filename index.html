<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.85); 
            --accent: #00B689;
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Manrope", sans-serif;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .header-visual {
            position: absolute;
            top: 0;
            width: 100%;
            height: 40vh;
            z-index: 1;
        }
        .header-visual img { width: 100%; height: 100%; object-fit: cover; }
        .header-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, var(--ios-bg) 98%);
        }

        .top-container {
            position: absolute;
            top: 6vh;
            width: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .branding { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; }
        .logo-text { font-size: 38px; font-weight: 800; letter-spacing: -0.06em; line-height: 1; }

        .segmented-container {
            width: 240px;
            background: rgba(120, 120, 128, 0.22);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 999px;
            padding: 2px;
            display: flex;
            position: relative;
            border: 0.5px solid rgba(255,255,255,0.08);
        }

        .segment-item {
            flex: 1;
            padding: 6px 0;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            z-index: 2;
            cursor: pointer;
            color: rgba(255,255,255,0.4);
        }

        .segment-item.active { color: white; }
        
        .liquid-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            height: calc(100% - 4px);
            background: rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, width;
        }

        .modal-glass {
            position: relative;
            height: 75vh;
            margin-top: 25vh;
            background: var(--ios-glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 32px 32px 0 0;
            z-index: 5;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.12);
        }

        .content-wrapper {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .view-section {
            width: 50%;
            padding: 32px 28px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .v-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
        .inactive-title { color: rgba(255,255,255,0.2); }

        .input-pill, .btn-action {
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .input-pill {
            background: rgba(255, 255, 255, 0.05);
            padding: 0 14px;
            border: 0.5px solid rgba(255,255,255,0.04);
            margin-bottom: 10px;
        }

        .icon-small { width: 18px; height: 18px; margin-right: 12px; filter: brightness(0) invert(1); opacity: 0.4; }
        .at-icon { font-size: 17px; font-weight: 500; color: white; opacity: 0.4; margin-right: 12px; width: 18px; text-align: center; }
        input { background: transparent; outline: none; width: 100%; font-size: 16px; color: white; }

        .btn-action {
            background: var(--accent);
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            width: 100%;
            margin-top: 18px;
            border: none;
        }
        .btn-action:active { opacity: 0.8; transform: scale(0.98); }

        /* Стили для элементов документации из массива */
        .doc-item { margin-bottom: 24px; }
        .doc-title { font-size: 19px; font-weight: 700; margin-bottom: 4px; color: white; }
        .doc-desc { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.5); line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header-visual">
        <img src="Content/GIFs/Background.gif">
    </div>

    <div class="top-container">
        <div class="branding">
            <img src="Content/Logos/HashLogo.JPG" class="logo-img">
            <span class="logo-text">Hash</span>
        </div>

        <div class="segmented-container" id="tabBar">
            <div class="liquid-slider" id="slider"></div>
            <div class="segment-item active" onclick="slideTo(0, this)">Документация</div>
            <div class="segment-item" onclick="slideTo(1, this)">Регистрация</div>
        </div>
    </div>

    <div class="modal-glass">
        <div class="content-wrapper" id="contentWrapper">
            
            <div class="view-section" id="docList">
                </div>

            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <div class="title-row">
                        <h2 class="text-xl font-bold">Регистрация</h2>
                        <div class="v-divider"></div>
                        <h2 class="text-xl font-bold inactive-title">Вход</h2>
                    </div>
                    
                    <div class="input-pill">
                        <img src="https://cdn-icons-png.flaticon.com/512/6997/6997204.png" class="icon-small">
                        <input type="text" placeholder="Имя" spellcheck="false">
                    </div>

                    <div class="input-pill">
                        <span class="at-icon">@</span>
                        <input type="text" placeholder="username" spellcheck="false">
                    </div>

                    <div class="input-pill">
                        <img src="https://cdn-icons-png.flaticon.com/512/15773/15773700.png" class="icon-small">
                        <input type="password" placeholder="Пароль">
                    </div>

                    <button class="btn-action">Продолжить</button>
                    <p class="text-center text-[10px] text-white/10 mt-6 tracking-widest uppercase">Hash Alpha v1.0</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const DOC_DATA = [
            { title: "Всё летает", desc: "Hash работает на пределе возможностей твоего железа. Никаких тяжелых анимаций и долгой прогрузки чатов — только чистая скорость." },
            { title: "Только свои", desc: "Это закрытое пространство для нашей компании. Здесь нет спам-ботов, левых каналов и рекламы — только живое общение." },
            { title: "Честный Sync", desc: "Заходи с любого устройства. Переписка, файлы и важные ссылки подтянутся мгновенно. Начал писать с компа — закончил на ходу с телефона." },
            { title: "Твои правила", desc: "Мессенджер полностью подстраивается под тебя. Настраивай уведомления, закрепляй важные диалоги и не отвлекайся на лишний шум." },
            { title: "Ничего лишнего", desc: "Мы выкинули всё, что тормозит обычные приложения. Hash бережет заряд батареи, чтобы ты всегда был на связи." }
        ];

        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('contentWrapper');
        const items = document.querySelectorAll('.segment-item');
        const docContainer = document.getElementById('docList');

        function renderDocs() {
            docContainer.innerHTML = `
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-xl font-bold mb-6">Документация</h2>
                    ${DOC_DATA.map(item => `
                        <div class="doc-item">
                            <div class="doc-title">${item.title}</div>
                            <div class="doc-desc">${item.desc}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function slideTo(idx, el) {
            items.forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            const x = el.offsetLeft - 2; 
            slider.style.transform = `translateX(${x}px)`;
            slider.style.width = el.offsetWidth + 'px';
            wrapper.style.transform = `translateX(-${idx * 50}%)`;
        }

        window.onload = () => {
            renderDocs();
            const initial = items[0];
            slider.style.width = initial.offsetWidth + 'px';
            slider.style.transform = `translateX(${initial.offsetLeft - 2}px)`;
        };
    </script>
</body>
</html>
