<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.85); 
            --accent: #00B689;
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Manrope", sans-serif;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .header-visual {
            position: absolute;
            top: 0;
            width: 100%;
            height: 40vh;
            z-index: 1;
        }

        .header-visual img { width: 100%; height: 100%; object-fit: cover; }

        .header-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, var(--ios-bg) 98%);
        }

        .top-container {
            position: absolute;
            top: 5vh;
            width: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .branding { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; }
        .logo-text { font-size: 38px; font-weight: 800; letter-spacing: -0.06em; line-height: 1; }

        /* Оптимизированный бар без лагов */
        .segmented-container {
            width: 310px;
            background: rgba(120, 120, 128, 0.22);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 999px;
            padding: 2px;
            display: flex;
            position: relative;
            border: 0.5px solid rgba(255,255,255,0.08);
        }

        .segment-item {
            flex: 1;
            padding: 7px 0;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            z-index: 2;
            cursor: pointer;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .segment-item.active { color: white; }

        .divider {
            width: 1px;
            height: 12px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }

        .liquid-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            height: calc(100% - 4px);
            /* Ширина теперь вычисляется динамически для 3-х элементов с учетом разделителя */
            width: calc(33.3% - 4px); 
            background: rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            z-index: 1;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .modal-glass {
            position: relative;
            height: 75vh;
            margin-top: 25vh;
            background: var(--ios-glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 32px 32px 0 0;
            z-index: 5;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.12);
        }

        .content-wrapper {
            display: flex;
            width: 300%; /* Три секции */
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .view-section {
            width: 33.33%;
            padding: 32px 28px;
            box-sizing: border-box;
        }

        .input-pill, .btn-action {
            height: 44px; /* Единая высота для всего */
            border-radius: 12px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .input-group { margin-bottom: 8px; }
        .input-pill {
            background: rgba(255, 255, 255, 0.05);
            padding: 0 14px;
            border: 0.5px solid rgba(255,255,255,0.04);
        }

        .icon-small { 
            width: 18px; height: 18px; margin-right: 12px; 
            filter: brightness(0) invert(1); opacity: 0.4; 
        }

        .at-icon {
            font-size: 17px; font-weight: 500; color: white;
            opacity: 0.4; margin-right: 12px; width: 18px; text-align: center;
        }

        input { background: transparent; outline: none; width: 100%; font-size: 16px; color: white; }

        .btn-action {
            background: var(--accent);
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            width: 100%;
            margin-top: 12px;
            border: none;
            cursor: pointer;
        }

        .btn-action:active { opacity: 0.8; transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header-visual">
        <img src="Content/GIFs/Background.gif">
    </div>

    <div class="top-container">
        <div class="branding">
            <img src="Content/Logos/HashLogo.JPG" class="logo-img">
            <span class="logo-text">Hash</span>
        </div>

        <div class="segmented-container">
            <div class="liquid-slider" id="slider"></div>
            <div class="segment-item active" onclick="slideTo(0, this)">Документация</div>
            <div class="segment-item" onclick="slideTo(1, this)">Регистрация</div>
            <div class="divider"></div>
            <div class="segment-item" onclick="slideTo(2, this)">Вход</div>
        </div>
    </div>

    <div class="modal-glass">
        <div class="content-wrapper" id="contentWrapper">
            
            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-xl font-bold mb-5">Документация</h2>
                    <div class="space-y-3">
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                            <h3 class="text-[#00B689] font-bold text-[10px] uppercase tracking-widest mb-1">Безопасность</h3>
                            <p class="text-[13px] text-white/60">Все ключи хранятся в защищенном анклаве вашего устройства.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-xl font-bold mb-5">Регистрация</h2>
                    
                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/6997/6997204.png" class="icon-small">
                            <input type="text" placeholder="Имя" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <span class="at-icon">@</span>
                            <input type="text" placeholder="username" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/15773/15773700.png" class="icon-small">
                            <input type="password" placeholder="Пароль">
                        </div>
                    </div>

                    <button class="btn-action">Продолжить</button>
                </div>
            </div>

            <div class="view-section">
                <div class="max-w-[360px] mx-auto text-center pt-10">
                    <h2 class="text-xl font-bold mb-2">Вход</h2>
                    <p class="text-white/30 text-sm">Этот раздел находится в разработке.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('contentWrapper');
        const items = document.querySelectorAll('.segment-item');

        function slideTo(idx, el) {
            items.forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            // Плавное перемещение слайдера через transform (без лагов)
            // Учитываем ширину одного сегмента (примерно 33.3%)
            const position = idx * 100;
            slider.style.transform = `translateX(${position}%)`;
            
            // Перелистывание контента
            wrapper.style.transform = `translateX(-${idx * 33.333}%)`;
        }
    </script>
</body>
</html>
