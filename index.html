<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.85);
            --accent: #00B689;
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Manrope", sans-serif;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .header-visual {
            position: absolute;
            top: 0;
            width: 100%;
            height: 45vh;
            z-index: 1;
        }

        .header-visual img { width: 100%; height: 100%; object-fit: cover; }

        .header-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, 
                transparent 0%, 
                rgba(0,0,0,0.2) 50%, 
                rgba(0,0,0,0.8) 85%, 
                var(--ios-bg) 100%);
        }

        .top-container {
            position: absolute;
            top: 6vh;
            width: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .branding { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; }
        .logo-text { font-size: 30px; font-weight: 800; letter-spacing: -0.05em; }

        .segmented-container {
            width: 250px;
            background: rgba(120, 120, 128, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 999px;
            padding: 3px;
            display: flex;
            position: relative;
            border: 0.5px solid rgba(255,255,255,0.08);
        }

        .segment-item {
            flex: 1;
            padding: 6px 0;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            z-index: 2;
            cursor: pointer;
            color: rgba(255,255,255,0.4);
            transition: color 0.3s;
        }

        .segment-item.active { color: white; }

        .slider {
            position: absolute;
            top: 3px;
            left: 3px;
            height: calc(100% - 6px);
            background: rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            z-index: 1;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-glass {
            position: relative;
            height: 75vh;
            margin-top: 25vh;
            background: var(--ios-glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 32px 32px 0 0;
            z-index: 5;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.12);
        }

        .content-wrapper {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-section { width: 50%; padding: 32px 28px; box-sizing: border-box; }

        .input-pill {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 9px 14px;
            display: flex;
            align-items: center;
            border: 0.5px solid rgba(255,255,255,0.04);
            margin-bottom: 10px;
        }

        .icon-small { width: 18px; height: 18px; margin-right: 12px; filter: brightness(0) invert(1); opacity: 0.4; }
        .at-symbol { font-size: 17px; color: white; opacity: 0.4; margin-right: 12px; width: 18px; text-align: center; }
        
        input { background: transparent; outline: none; width: 100%; font-size: 16px; color: white; }

        .btn-action {
            background: var(--accent);
            border-radius: 12px;
            padding: 13px;
            font-size: 16px;
            font-weight: 700;
            color: #000;
            width: 100%;
            margin-top: 15px;
            border: none;
        }

        .btn-action:active { opacity: 0.8; transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header-visual">
        <img src="Content/GIFs/Background.gif" alt="">
    </div>

    <div class="top-container">
        <div class="branding">
            <img src="Content/Logos/HashLogo.JPG" class="logo-img" alt="">
            <span class="logo-text">Hash</span>
        </div>
        <div class="segmented-container">
            <div class="slider" id="slider"></div>
            <div class="segment-item active" onclick="slideTo(0, this)">Документация</div>
            <div class="segment-item" onclick="slideTo(1, this)">Логин</div>
        </div>
    </div>

    <div class="modal-glass">
        <div class="content-wrapper" id="wrapper">
            
            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-xl font-bold mb-5">Enterprise Messenger</h2>
                    <div class="space-y-3">
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                            <h3 class="text-[#00B689] font-bold text-[10px] uppercase mb-1">Local Only</h3>
                            <p class="text-[13px] text-white/60">Ваша переписка никогда не покидает пределы компании.</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                            <h3 class="text-[#00B689] font-bold text-[10px] uppercase mb-1">Stealth Mode</h3>
                            <p class="text-[13px] text-white/60">Автоматическое удаление истории после сессии.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-xl font-bold mb-5">Регистрация</h2>
                    <div class="input-pill">
                        <img src="https://cdn-icons-png.flaticon.com/512/6997/6997204.png" class="icon-small">
                        <input type="text" placeholder="Имя" autocomplete="off">
                    </div>
                    <div class="input-pill">
                        <span class="at-symbol">@</span>
                        <input type="text" placeholder="username" autocomplete="off">
                    </div>
                    <div class="input-pill">
                        <img src="https://cdn-icons-png.flaticon.com/512/15773/15773700.png" class="icon-small">
                        <input type="password" placeholder="Пароль">
                    </div>
                    <button class="btn-action">Продолжить</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('wrapper');
        const items = document.querySelectorAll('.segment-item');

        function slideTo(idx, el) {
            items.forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            slider.style.left = el.offsetLeft + 'px';
            slider.style.width = el.offsetWidth + 'px';
            wrapper.style.transform = `translateX(-${idx * 50}%)`;
        }

        window.onload = () => {
            slider.style.left = items[0].offsetLeft + 'px';
            slider.style.width = items[0].offsetWidth + 'px';
        };
    </script>
</body>
</html>
