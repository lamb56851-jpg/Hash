<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hash — Secure Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-bg: #000000;
            /* Модалка: 0.85 прозрачность */
            --modal-glass: rgba(28, 28, 30, 0.85); 
            --ios-tertiary-bg: rgba(255, 255, 255, 0.08);
            --accent: #00B689;
            /* Активная плашка: темнее для контраста */
            --segment-active: rgba(0, 0, 0, 0.4); 
        }

        body, html {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Manrope", sans-serif;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Фон с гифкой */
        .header-visual {
            position: absolute;
            top: 0;
            width: 100%;
            height: 45vh;
            z-index: 1;
        }
        .header-visual img { width: 100%; height: 100%; object-fit: cover; }
        .header-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, var(--ios-bg) 100%);
        }

        /* Верхний блок: Брендинг + Табы */
        .top-container {
            position: absolute;
            top: 7vh;
            width: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .branding { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 46px; height: 46px; border-radius: 11px; object-fit: cover; }
        .logo-text { font-size: 34px; font-weight: 800; letter-spacing: -0.05em; }

        /* Переключатель с Блюром объектов на фоне */
        .segmented-container {
            width: 240px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 2px;
            display: flex;
            position: relative;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .segment-item {
            flex: 1;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            z-index: 2;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            transition: color 0.3s ease;
        }
        .segment-item.active { color: white; }
        
        .liquid-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            height: calc(100% - 4px);
            background: var(--segment-active);
            border-radius: 10px;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Главная модалка: Прозрачность + Блюр */
        .modal-glass {
            position: relative;
            height: 62vh;
            margin-top: 38vh;
            background: var(--modal-glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 35px 35px 0 0;
            z-index: 10;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.12);
        }

        .content-wrapper {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .view-section {
            width: 50%;
            padding: 35px 28px;
            box-sizing: border-box;
        }

        /* Инпуты */
        .input-group { margin-bottom: 16px; }
        .input-pill {
            background: var(--ios-tertiary-bg);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .icon-small { width: 18px; height: 18px; margin-right: 12px; filter: invert(1); opacity: 0.7; }
        input { background: transparent; outline: none; width: 100%; font-size: 16px; color: white; }
        input::placeholder { color: rgba(255,255,255,0.3); }

        /* Кнопка iOS Style */
        .btn-action {
            background: var(--accent);
            border-radius: 16px;
            padding: 15px;
            font-size: 17px;
            font-weight: 700;
            color: #000;
            width: 100%;
            margin-top: 10px;
            border: none;
            transition: transform 0.1s ease;
        }
        .btn-action:active { transform: scale(0.97); opacity: 0.9; }

        .doc-card {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="header-visual">
        <img src="Content/GIFs/Background.gif" alt="bg">
    </div>

    <div class="top-container">
        <div class="branding">
            <img src="Content/Logos/HashLogo.JPG" class="logo-img" alt="Hash">
            <span class="logo-text">Hash</span>
        </div>

        <div class="segmented-container" id="tabBar">
            <div class="liquid-slider" id="slider"></div>
            <div class="segment-item active" onclick="slideTo(0, this)">Документация</div>
            <div class="segment-item" onclick="slideTo(1, this)">Логин</div>
        </div>
    </div>

    <div class="modal-glass">
        <div class="content-wrapper" id="contentWrapper">
            
            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-2xl font-bold mb-5">Принципы Hash</h2>
                    <div class="doc-card">
                        <div class="text-[#00B689] font-extrabold text-[11px] uppercase tracking-wider mb-1">Безопасность</div>
                        <p class="text-[14px] text-white/70 leading-relaxed">Весь трафик внутри компании зашифрован. Мы не используем сторонние облака.</p>
                    </div>
                    <div class="doc-card">
                        <div class="text-[#00B689] font-extrabold text-[11px] uppercase tracking-wider mb-1">Свобода</div>
                        <p class="text-[14px] text-white/70 leading-relaxed">Никакой привязки к SIM-картам. Общайтесь анонимно и профессионально.</p>
                    </div>
                </div>
            </div>

            <div class="view-section">
                <div class="max-w-[360px] mx-auto">
                    <h2 class="text-2xl font-bold mb-5">Регистрация</h2>
                    
                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/6997/6997204.png" class="icon-small">
                            <input type="text" placeholder="Ваше имя" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <span class="text-white/40 mr-3 font-bold">@</span>
                            <input type="text" placeholder="username" spellcheck="false">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-pill">
                            <img src="https://cdn-icons-png.flaticon.com/512/15773/15773700.png" class="icon-small">
                            <input type="password" placeholder="Пароль">
                        </div>
                    </div>

                    <button class="btn-action">Продолжить</button>
                    <p class="text-center text-white/20 text-[12px] mt-6 font-medium tracking-widest">ALPHA BUILD V1.0</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const wrapper = document.getElementById('contentWrapper');
        const items = document.querySelectorAll('.segment-item');

        function slideTo(index, el) {
            items.forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            
            slider.style.left = el.offsetLeft + 'px';
            slider.style.width = el.offsetWidth + 'px';

            wrapper.style.transform = `translateX(-${index * 50}%)`;
        }

        // Корректная инициализация размеров при загрузке
        window.addEventListener('load', () => {
            const initial = items[0];
            slider.style.left = initial.offsetLeft + 'px';
            slider.style.width = initial.offsetWidth + 'px';
        });
    </script>
</body>
</html>
